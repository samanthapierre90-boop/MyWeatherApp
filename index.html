<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="src/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <title>MyWeatherApp</title>
  </head>
  <body>
    <main>
      <div class="app">
        <header>
          <h2>Weather Information</h2>
        </header>
        <form class="search-form">
          <input
            type="text"
            placeholder="Enter city..."
            required
            class="search-form-input"
          />

          <button type="submit" class="search-form-button">Get Weather</button>
        </form>

        <div class="content">
          <div class="weather-info">
            <div class="data-display">
              <div class="top-weather">
                <p id="city">City</p>
              </div>

              <div class="weather-details">
                <p id="description">Description:</p>
                <p id="humidity">Humidity:</p>
                <p id="wind">Wind:</p>
              </div>
            </div>
          </div>

          <div class="temperature-display">
            <div id="large-weather-icon">☀️</div>
            <div id="large-temperature">--°</div>
          </div>
        </div>
      </div>
    </main>
    <footer>
      <a href="https://github.com/samanthapierre90-boop" target="_blank">
        Created by Samantha Pierre
      </a>

      <a
        href="https://github.com/samanthapierre90-boop?tab=repositories"
        target="_blank"
      >
        GitHub</a
      >

      <a href="https://unique-eclair-32d442.netlify.app/" target="_blank">
        Netlify</a
      >
    </footer>

    <script src="src/index.js"></script>
  </body>
</html>
