<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=BBH+Bartle&family=BBH+Bogle&family=Bebas+Neue&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/styles.css" />
    <title>MyWeatherApp</title>
  </head>
  <body>
     <main>
        <div class="app">
    <header>
<h2>Weather Information</h2>
        
    </header>
   <form class="search-form">
  <input 
    type="text" 
    placeholder="Enter city..." 
    required 
    class="search-form-input"
  />

  <button 
    type="submit" 
    class="search-form-button">
    Get Weather
  </button>
</form>


<div class="content">

  <div class="weather-info">
    <div class="data-display">
      <p id="city">City:</p>
      <p id="temperature">Temperature:</p>
      <p id="description">Description:</p>
    </div>
  </div>


  <div class="temperature-chart">
    <h2>Temperature Chart</h2>
    <canvas id="temperatureChart"></canvas>
  </div>

</div>
      
    </main>
    <footer>
      <a href="https://github.com/samanthapierre90-boop" target="_blank">

</a>

    </div>
  </body>
</html>
